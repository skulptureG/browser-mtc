<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTC Generator – Spec / Isadora (Stable)</title>

<style>
body {
    background: radial-gradient(circle at top, #111, #000);
    color: #00ff66;
    font-family: "Segoe UI", monospace;
    text-align: center;
    padding: 30px;
}

#timecode {
    font-size: 72px;
    letter-spacing: 6px;
    margin: 20px 0;
    text-shadow: 0 0 25px #00ff66;
}

/* ---------- STATUS ---------- */
#status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 14px;
}

#led {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #400;
    box-shadow: 0 0 6px #400;
}

/* ---------- CONTROLS ---------- */
.controls button {
    font-size: 16px;
    padding: 12px 26px;
    margin: 10px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    color: #000;
    font-weight: bold;
}

.play {
    background: linear-gradient(#4cff4c, #1a9f1a);
    box-shadow: 0 0 20px rgba(0,255,0,0.6);
}

.pause {
    background: linear-gradient(#ffd84c, #c9a400);
    box-shadow: 0 0 20px rgba(255,200,0,0.6);
}

.stop {
    background: linear-gradient(#ff4c4c, #a00000);
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
}

select, input {
    background: #111;
    color: #fff;
    border: 1px solid #333;
    padding: 6px;
    margin-left: 6px;
}
</style>
</head>

<body>

<h2>MIDI Timecode Generator</h2>

<div>
    MIDI Out:
    <select id="midiOut"></select>

    FPS:
    <select id="fps">
        <option value="24">24</option>
        <option value="25" selected>25</option>
        <option value="30">30</option>
        <option value="50">50</option>
        <option value="60">60</option>
    </select>

    Isadora Mode:
    <input type="checkbox" id="isadoraMode" checked>
</div>

<div id="timecode">00:00:00:00</div>

<div id="status">
    <div id="led"></div>
    <div id="statusText">STOPPED</div>
</div>

<div class="controls">
    <button class="play" onclick="play()">PLAY</button>
    <button class="pause" onclick="pause()">PAUSE</button>
    <button class="stop" onclick="stop()">STOP</button>
</div>

<script>
/* ================= DOM ================= */
const midiOutSelect = document.getElementById("midiOut");
const fpsSelect = document.getElementById("fps");
const isadoraCheckbox = document.getElementById("isadoraMode");
const led = document.getElementById("led");
const statusText = document.getElementById("statusText");

/* ================= STATE ================= */
let midiAccess = null;
let midiOutput = null;
let running = false;

let hours = 0, minutes = 0, seconds = 0, frames = 0;
let qfPiece = 0;
let nextTickTime = 0;

/* ================= STATUS ================= */
function setStatus(state) {
    statusText.textContent = state;
    led.style.background =
        state === "RUNNING" ? "#0f0" :
        state === "PAUSED"  ? "#fb0" : "#400";
}

/* ================= MIDI INIT (USER GESTURE) ================= */
function initMIDI() {
    if (midiAccess) return;

    navigator.requestMIDIAccess().then(midi => {
        midiAccess = midi;
        midiOutSelect.innerHTML = "";

        midi.outputs.forEach(out => {
            const opt = document.createElement("option");
            opt.value = out.id;
            opt.textContent = out.name;
            midiOutSelect.appendChild(opt);
        });

        if (midiOutSelect.options.length) {
            midiOutSelect.selectedIndex = 0;
            midiOutput = midi.outputs.get(midiOutSelect.value);
        }

        midiOutSelect.onchange = () => {
            midiOutput = midi.outputs.get(midiOutSelect.value);
        };
    }).catch(err => {
        console.error("MIDI access failed:", err);
    });
}

/* ================= TIME HELPERS ================= */
function pad(v) { return v.toString().padStart(2, "0"); }

function updateDisplay() {
    timecode.textContent =
        `${pad(hours)}:${pad(minutes)}:${pad(seconds)}:${pad(frames)}`;
}

/* ================= FRAME RATE HELPERS ================= */
function getMTCBaseFps(fps) {
    if (fps === 50) return 25;
    if (fps === 60) return 30;
    return fps;
}

function getFrameRateType(fps, dropFrame = false) {
    if (fps === 24) return 0;
    if (fps === 25) return 1;
    if (fps === 29.97 && dropFrame) return 2;
    return 3;
}

/* ================= YOUR FUNCTION ================= */
function buildQuarterFrameMessage(piece, hours, minutes, seconds, frames, fps, dropFrame) {
    let nibbleValue = 0;

    switch (piece) {
        case 0: nibbleValue = frames & 0x0F; break;
        case 1: nibbleValue = (frames >> 4) & 0x01; break;
        case 2: nibbleValue = seconds & 0x0F; break;
        case 3: nibbleValue = (seconds >> 4) & 0x03; break;
        case 4: nibbleValue = minutes & 0x0F; break;
        case 5: nibbleValue = (minutes >> 4) & 0x03; break;
        case 6: nibbleValue = hours & 0x0F; break;
        case 7:
            nibbleValue =
                ((hours >> 4) & 0x01) |
                (getFrameRateType(fps, false) << 1);
            break;
    }

    return [0xF1, (piece << 4) | nibbleValue];
}

/* ================= CLOCK ================= */
function advanceFrame(fps) {
    frames++;
    if (frames >= fps) {
        frames = 0;
        seconds++;
        if (seconds >= 60) {
            seconds = 0;
            minutes++;
            if (minutes >= 60) {
                minutes = 0;
                hours = (hours + 1) % 24;
            }
        }
    }
}

function tick(fps, baseFps) {
    if (!midiOutput) return;

    const msg = buildQuarterFrameMessage(
        qfPiece,
        hours,
        minutes,
        seconds,
        frames,
        baseFps,
        false
    );

    midiOutput.send(msg);

    if (qfPiece === 7) {
        advanceFrame(fps);
        updateDisplay();
    }

    qfPiece = (qfPiece + 1) % 8;
}

/* ================= TRANSPORT ================= */
function play() {
    initMIDI(); // ✅ user gesture MIDI init

    if (running) return;

    running = true;
    setStatus("RUNNING");

    const fps = parseInt(fpsSelect.value, 10);
    const baseFps = getMTCBaseFps(fps);

    const qfRate =
        isadoraCheckbox.checked ? baseFps * 4 : baseFps * 8;

    const qfInterval = 1000 / qfRate;

    nextTickTime = performance.now();
    qfPiece = 0;

    function scheduler(now) {
        if (!running) return;

        while (now >= nextTickTime) {
            tick(fps, baseFps);
            nextTickTime += qfInterval;
        }

        requestAnimationFrame(scheduler);
    }

    requestAnimationFrame(scheduler);
}

function pause() {
    running = false;
    setStatus("PAUSED");
}

function stop() {
    running = false;
    hours = minutes = seconds = frames = 0;
    qfPiece = 0;
    updateDisplay();
    setStatus("STOPPED");
}
</script>

</body>
</html>
