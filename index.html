<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MTC Generator – Stable + Loop</title>

<style>
body {
    background: radial-gradient(circle at top, #111, #000);
    color: #00ff66;
    font-family: "Segoe UI", monospace;
    text-align: center;
    padding: 30px;
}

#timecode {
    font-size: 72px;
    letter-spacing: 6px;
    margin: 20px 0;
    text-shadow: 0 0 25px #00ff66;
}

#status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 14px;
}

#led {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #400;
}

.controls button, .midi button {
    font-size: 15px;
    padding: 10px 22px;
    margin: 6px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.play  { background:#4cff4c; }
.pause { background:#ffd84c; }
.stop  { background:#ff4c4c; }

.midi button { background:#3aaaff; }

select, input {
    background:#111;
    color:#fff;
    border:1px solid #333;
    padding:6px;
    margin-left:6px;
}
</style>
</head>

<body>

<h2>MIDI Timecode Generator</h2>

<div class="midi">
    <button onclick="initMIDI()">Enable MIDI</button>
    MIDI Out:
    <select id="midiOut"></select>

    FPS:
    <select id="fps">
        <option>24</option>
        <option selected>25</option>
        <option>30</option>
        <option>50</option>
        <option>60</option>
    </select>
</div>

<div style="margin-top:10px">
    End TC:
    <input id="endTC" value="00:00:10:00" size="10">

    Loop:
    <input type="checkbox" id="loopEnabled" checked>

    Loop Pause (ms):
    <input id="loopPause" type="number" value="1000" style="width:90px">
</div>

<div id="timecode">00:00:00:00</div>

<div id="status">
    <div id="led"></div>
    <div id="statusText">STOPPED</div>
</div>

<div class="controls">
    <button class="play" onclick="play()">PLAY</button>
    <button class="pause" onclick="pause()">PAUSE</button>
    <button class="stop" onclick="stop()">STOP</button>
</div>

<script>
const midiOutSelect = document.getElementById("midiOut");
const fpsSelect = document.getElementById("fps");
const endTCInput = document.getElementById("endTC");
const loopEnabled = document.getElementById("loopEnabled");
const loopPauseInput = document.getElementById("loopPause");
const led = document.getElementById("led");
const statusText = document.getElementById("statusText");

let midiAccess = null;
let midiOutput = null;
let running = false;
let loopWaiting = false;

let h=0,m=0,s=0,f=0;
let qfPiece = 0;
let nextTickTime = 0;

/* ---------- STATUS ---------- */
function setStatus(t){
    statusText.textContent = t;
    led.style.background =
        t==="RUNNING" ? "#0f0" :
        t==="PAUSED"  ? "#fb0" : "#400";
}

/* ---------- MIDI INIT ---------- */
function initMIDI(){
    if(midiAccess) return;

    navigator.requestMIDIAccess().then(midi=>{
        midiAccess = midi;
        midiOutSelect.innerHTML="";

        midi.outputs.forEach(o=>{
            const opt=document.createElement("option");
            opt.value=o.id;
            opt.textContent=o.name;
            midiOutSelect.appendChild(opt);
        });

        if(midiOutSelect.options.length){
            midiOutSelect.selectedIndex=0;
            midiOutput=midi.outputs.get(midiOutSelect.value);
        }

        midiOutSelect.onchange=()=>{
            midiOutput=midi.outputs.get(midiOutSelect.value);
        };
    });
}

/* ---------- MTC ---------- */
function getFrameRateType(fps){
    if(fps===24) return 0;
    if(fps===25) return 1;
    return 3;
}

function buildQuarterFrameMessage(piece,h,m,s,f,fps){
    let v=0;
    switch(piece){
        case 0: v=f&15; break;
        case 1: v=(f>>4)&1; break;
        case 2: v=s&15; break;
        case 3: v=(s>>4)&3; break;
        case 4: v=m&15; break;
        case 5: v=(m>>4)&3; break;
        case 6: v=h&15; break;
        case 7: v=((h>>4)&1)|(getFrameRateType(fps)<<1); break;
    }
    return [0xF1,(piece<<4)|v];
}

function advanceFrame(fps){
    f++;
    if(f>=fps){ f=0; s++; }
    if(s>=60){ s=0; m++; }
    if(m>=60){ m=0; h=(h+1)%24; }
}

function updateDisplay(){
    timecode.textContent=
        `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}:${String(f).padStart(2,"0")}`;
}

function parseTC(tc,fps){
    const [hh,mm,ss,ff]=tc.split(":").map(Number);
    return (((hh*60+mm)*60+ss)*fps)+ff;
}

function currentFrame(fps){
    return (((h*60+m)*60+s)*fps)+f;
}

function tick(fps){
    if(!midiOutput || loopWaiting) return;

    midiOutput.send(buildQuarterFrameMessage(qfPiece,h,m,s,f,fps));

    if(qfPiece===3 || qfPiece===7){
        advanceFrame(fps);
        updateDisplay();
        checkEnd(fps);
    }

    qfPiece=(qfPiece+1)%8;
}

/* ---------- END / LOOP ---------- */
function checkEnd(fps){
    const endFrame=parseTC(endTCInput.value,fps);
    if(currentFrame(fps)>=endFrame){
        if(loopEnabled.checked){
            loopWaiting=true;
            setStatus("PAUSED");

            setTimeout(()=>{
                h=m=s=f=0;
                qfPiece=0;
                updateDisplay();
                loopWaiting=false;
                setStatus("RUNNING");
            },parseInt(loopPauseInput.value)||0);
        } else {
            stop();
        }
    }
}

/* ---------- TRANSPORT ---------- */
function play(){
    initMIDI();
    if(running) return;
    running=true;
    setStatus("RUNNING");

    const fps=parseInt(fpsSelect.value);
    const qfInterval=1000/(fps*8);
    nextTickTime=performance.now();
    qfPiece=0;

    function sched(now){
        if(!running) return;
        while(now>=nextTickTime){
            tick(fps);
            nextTickTime+=qfInterval;
        }
        requestAnimationFrame(sched);
    }
    requestAnimationFrame(sched);
}

function pause(){
    running=false;
    setStatus("PAUSED");
}

function stop(){
    running=false;
    h=m=s=f=0;
    qfPiece=0;
    updateDisplay();
    setStatus("STOPPED");
}
</script>

</body>
</html>
