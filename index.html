<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser MIDI MTC Generator</title>

<style>
body {
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: #00ff88;
    font-family: "Segoe UI", monospace;
    text-align: center;
    padding: 30px;
}

h2 {
    font-weight: 300;
    letter-spacing: 2px;
    opacity: 0.85;
}

select, input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    backdrop-filter: blur(8px);
    margin: 4px;
}

/* ---------- TIMECODE ---------- */
#timecode {
    font-size: 86px;
    letter-spacing: 6px;
    margin: 30px 0 16px;
    color: #00ff88;
    text-shadow:
        0 0 10px rgba(0,255,136,0.7),
        0 0 30px rgba(0,255,136,0.5),
        0 0 60px rgba(0,255,136,0.25);
}

/* ---------- PULSE ---------- */
#pulse {
    width: 22px;
    height: 22px;
    margin: 0 auto 28px;
    border-radius: 50%;
    background: #00ff88;
    opacity: 0.2;
    box-shadow: 0 0 20px rgba(0,255,136,0.8);
}

.pulsing {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%   { transform: scale(0.6); opacity: 0.2; }
    50%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(0.6); opacity: 0.2; }
}

/* ---------- CONTROLS ---------- */
.controls button {
    font-size: 18px;
    padding: 14px 28px;
    margin: 10px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.35),
        0 10px 24px rgba(0,0,0,0.7);
}

.controls button:hover {
    transform: translateY(-1px);
}

.play  { color:#00ff88; box-shadow:0 0 25px rgba(0,255,136,0.45); }
.pause { color:#ffb400; box-shadow:0 0 25px rgba(255,180,0,0.45); }
.stop  { color:#ff4444; box-shadow:0 0 25px rgba(255,68,68,0.45); }

.panel {
    margin-top: 14px;
    font-size: 14px;
    opacity: 0.9;
}
</style>
</head>

<body>

<h2>MIDI Timecode Generator</h2>

<div class="panel">
    MIDI Out:
    <select id="midiOut"></select>

    FPS:
    <select id="fps">
        <option value="24">24</option>
        <option value="25" selected>25</option>
        <option value="29.97">29.97</option>
        <option value="30">30</option>
        <option value="50">50</option>
        <option value="60">60</option>
    </select>
</div>

<div class="panel">
    Start TC:
    <input id="startTC" value="00:00:00:00" size="10">

    End TC:
    <input id="endTC" value="00:00:10:00" size="10">

    Loop:
    <input type="checkbox" id="loop" checked>
</div>

<div id="timecode">00:00:00:00</div>
<div id="pulse"></div>

<div class="controls">
    <button class="play" onclick="play()">Play</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="stop" onclick="stop()">Stop</button>
</div>

<script>
let midiOutput = null;
let running = false;
let timer = null;

let fps = 25;
let frames = 0, seconds = 0, minutes = 0, hours = 0;

navigator.requestMIDIAccess().then(midi => {
    const sel = document.getElementById("midiOut");
    midi.outputs.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = o.name;
        sel.appendChild(opt);
    });
    sel.onchange = () => midiOutput = midi.outputs.get(sel.value);
    if (sel.options.length) {
        sel.selectedIndex = 0;
        midiOutput = midi.outputs.get(sel.value);
    }
});

document.getElementById("fps").onchange = e => fps = parseFloat(e.target.value);

function parseTC(tc) {
    const [h,m,s,f] = tc.split(":").map(Number);
    return (((h*60+m)*60+s)*fps)+f;
}

function setFromFrames(t) {
    frames = t % fps;
    seconds = Math.floor(t / fps) % 60;
    minutes = Math.floor(t / (fps*60)) % 60;
    hours = Math.floor(t / (fps*3600)) % 24;
}

function tick() {
    let t = parseTC(displayTC()) + 1;
    const end = parseTC(endTC.value);

    if (t > end) {
        if (loop.checked) {
            t = parseTC(startTC.value);
        } else {
            stop();
            return;
        }
    }

    setFromFrames(t);
    updateDisplay();
    sendMTC();
}

function displayTC() {
    return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}:${pad(frames)}`;
}

function updateDisplay() {
    timecode.textContent = displayTC();
}

function pad(v){return v.toString().padStart(2,"0");}

function sendMTC() {
    if (!midiOutput) return;
    const rateBits = fps==25 ? 0b01 : fps==30 ? 0b11 : 0b00;
    const d=[
        frames&0xF,(frames>>4)&1,
        seconds&0xF,(seconds>>4)&3,
        minutes&0xF,(minutes>>4)&3,
        hours&0xF,((hours>>4)&1)|(rateBits<<1)
    ];
    for(let i=0;i<8;i++) midiOutput.send([0xF1,(i<<4)|d[i]]);
}

function play(){
    if(running)return;
    running=true;
    setFromFrames(parseTC(startTC.value));
    timer=setInterval(tick,1000/fps);
    pulse.classList.add("pulsing");
}

function pause(){
    running=false;
    clearInterval(timer);
    pulse.classList.remove("pulsing");
}

function stop(){
    pause();
    setFromFrames(parseTC(startTC.value));
    updateDisplay();
}
</script>

</body>
</html>
