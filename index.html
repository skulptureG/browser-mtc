<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple MTC Generator (Isadora‑safe)</title>

<style>
body {
    background:#000;
    color:#0f0;
    font-family:monospace;
    text-align:center;
    padding:20px;
}

#timecode {
    font-size:64px;
    margin:20px 0;
}

button {
    font-size:16px;
    padding:10px 20px;
    margin:5px;
}
</style>
</head>

<body>

<h2>MIDI Timecode Generator</h2>

MIDI Out:
<select id="midiOut"></select>

<div id="timecode">00:00:00:00</div>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="stop()">Stop</button>

<script>
/* ================= CORE STATE ================= */
let midiOutput = null;
let running = false;
let timer = null;

const fps = 25;              // match Isadora
const qfPerFrame = 4;        // Isadora compatibility

let frames = 0;
let seconds = 0;
let minutes = 0;
let hours = 0;
let qfIndex = 0;

/* ================= MIDI ================= */
navigator.requestMIDIAccess().then(midi => {
    midi.outputs.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = o.name;
        midiOut.appendChild(opt);
    });

    midiOut.onchange = () => {
        midiOutput = midi.outputs.get(midiOut.value);
    };

    if (midiOut.options.length) {
        midiOut.selectedIndex = 0;
        midiOutput = midi.outputs.get(midiOut.value);
    }
});

/* ================= TIMECODE ================= */
function tick() {
    sendMTC();

    if (qfIndex === qfPerFrame - 1) {
        frames++;
        if (frames >= fps) {
            frames = 0;
            seconds++;
            if (seconds >= 60) {
                seconds = 0;
                minutes++;
                if (minutes >= 60) {
                    minutes = 0;
                    hours = (hours + 1) % 24;
                }
            }
        }
        updateDisplay();
    }

    qfIndex = (qfIndex + 1) % qfPerFrame;
}

function updateDisplay() {
    timecode.textContent =
        `${pad(hours)}:${pad(minutes)}:${pad(seconds)}:${pad(frames)}`;
}

function pad(v) {
    return v.toString().padStart(2, "0");
}

/* ================= MTC (Isadora‑safe) ================= */
function sendMTC() {
    if (!midiOutput) return;

    const rateBits = 0b01; // 25fps

    const data = [
        frames & 0x0F,
        seconds & 0x0F,
        minutes & 0x0F,
        ((hours & 0x1F) | (rateBits << 5))
    ];

    midiOutput.send([0xF1, (qfIndex << 4) | data[qfIndex]]);
}

/* ================= TRANSPORT ================= */
function play() {
    if (running) return;
    running = true;
    timer = setInterval(tick, 1000 / (fps * qfPerFrame));
}

function pause() {
    running = false;
    clearInterval(timer);
}

function stop() {
    pause();
    frames = seconds = minutes = hours = 0;
    updateDisplay();
}
</script>

</body>
</html>
