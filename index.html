<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser Based MIDI MTC Generator V.0.2</title>

<style>
body {
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: #00ff88;
    font-family: "Segoe UI", monospace;
    text-align: center;
    padding: 40px;
}

/* ---------- TITLE ---------- */
h2 {
    font-weight: 300;
    letter-spacing: 2px;
    opacity: 0.8;
}

/* ---------- MIDI SELECT ---------- */
select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 16px;
    backdrop-filter: blur(8px);
}

/* ---------- TIMECODE ---------- */
#timecode {
    font-size: 88px;
    letter-spacing: 6px;
    margin: 40px 0 20px;
    color: #000000;
    text-shadow:
        0 0 10px rgba(0,255,136,0.7),
        0 0 30px rgba(0,255,136,0.5),
        0 0 60px rgba(0,255,136,0.25);
}

/* ---------- PULSE INDICATOR ---------- */
#pulse {
    width: 22px;
    height: 22px;
    margin: 0 auto 35px;
    border-radius: 50%;
    background: #00ff88;
    opacity: 0.2;
    box-shadow: 0 0 20px rgba(0,255,136,0.8);
}

.pulsing {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%   { transform: scale(0.6); opacity: 0.2; }
    50%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(0.6); opacity: 0.2; }
}

/* ---------- CONTROLS ---------- */
.controls button {
    font-size: 18px;
    padding: 14px 30px;
    margin: 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    color: #fff;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.35),
        0 10px 24px rgba(0,0,0,0.7);
}

.controls button:hover {
    transform: translateY(-1px);
}

/* ---------- BUTTON COLOURS ---------- */
.play {
    color: #00ff88;
    box-shadow: 0 0 25px rgba(0,255,136,0.45);
}

.pause {
    color: #ffb400;
    box-shadow: 0 0 25px rgba(255,180,0,0.45);
}

.stop {
    color: #ff4444;
    box-shadow: 0 0 25px rgba(255,68,68,0.45);
}
</style>
</head>

<body>

<h2>MIDI Timecode Generator</h2>

<select id="midiOut"></select>

<div id="timecode">00:00:00:00</div>
<div id="pulse"></div>

<div class="controls">
    <button class="play" onclick="play()">Play</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="stop" onclick="stop()">Stop</button>
</div>

<script>
let midiOutput = null;
let running = false;
let timer = null;

const fps = 25;
let frames = 0;
let seconds = 0;
let minutes = 0;
let hours = 0;

/* ---------- MIDI SETUP ---------- */
navigator.requestMIDIAccess().then(midi => {
    const select = document.getElementById("midiOut");

    midi.outputs.forEach(output => {
        const opt = document.createElement("option");
        opt.value = output.id;
        opt.textContent = output.name;
        select.appendChild(opt);
    });

    select.onchange = () => {
        midiOutput = midi.outputs.get(select.value);
    };

    if (select.options.length > 0) {
        select.selectedIndex = 0;
        midiOutput = midi.outputs.get(select.value);
    }
});

/* ---------- TIME UPDATE ---------- */
function tick() {
    frames++;
    if (frames >= fps) {
        frames = 0;
        seconds++;
        if (seconds >= 60) {
            seconds = 0;
            minutes++;
            if (minutes >= 60) {
                minutes = 0;
                hours = (hours + 1) % 24;
            }
        }
    }

    updateDisplay();
    sendMTC();
}

function updateDisplay() {
    document.getElementById("timecode").textContent =
        `${pad(hours)}:${pad(minutes)}:${pad(seconds)}:${pad(frames)}`;
}

function pad(v) {
    return v.toString().padStart(2, "0");
}

/* ---------- MTC QUARTER FRAME ---------- */
function sendMTC() {
    if (!midiOutput) return;

    const data = [
        frames & 0x0F,
        (frames >> 4) & 0x01,
        seconds & 0x0F,
        (seconds >> 4) & 0x03,
        minutes & 0x0F,
        (minutes >> 4) & 0x03,
        hours & 0x0F,
        ((hours >> 4) & 0x01) | (0b01 << 1) // 25fps
    ];

    for (let i = 0; i < 8; i++) {
        midiOutput.send([0xF1, (i << 4) | data[i]]);
    }
}

/* ---------- CONTROLS ---------- */
function play() {
    if (running) return;
    running = true;
    timer = setInterval(tick, 1000 / fps);
    document.getElementById("pulse").classList.add("pulsing");
}

function pause() {
    running = false;
    clearInterval(timer);
    document.getElementById("pulse").classList.remove("pulsing");
}

function stop() {
    pause();
    frames = seconds = minutes = hours = 0;
    updateDisplay();
}
</script>

</body>
</html>
