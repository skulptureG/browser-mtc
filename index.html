<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser MIDI MTC Generator</title>

<style>
body {
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: #00ff88;
    font-family: "Segoe UI", monospace;
    text-align: center;
    padding: 20px;
}

h2 { font-weight:300; letter-spacing:2px; }

select, input, button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 14px;
    margin: 4px;
}

/* ---------- TIMECODE ---------- */
#timecode {
    font-size: 72px;
    margin: 20px 0;
    color: #00ff88;
    text-shadow: 0 0 30px rgba(0,255,136,.6);
}

/* ---------- TIMELINE ---------- */
#timeline {
    position: relative;
    height: 14px;
    background: rgba(255,255,255,0.15);
    border-radius: 7px;
    margin: 20px auto;
    width: 80%;
}

#playhead {
    position: absolute;
    top: -4px;
    width: 4px;
    height: 22px;
    background: #00ff88;
    box-shadow: 0 0 12px #00ff88;
}

.cue-marker {
    position: absolute;
    top: -6px;
    width: 6px;
    height: 26px;
    background: #ff4444;
}

/* ---------- CONTROLS ---------- */
.controls button {
    font-size: 16px;
    padding: 10px 20px;
    margin: 6px;
    border-radius: 14px;
    cursor: pointer;
}

.play  { color:#00ff88; }
.pause { color:#ffb400; }
.stop  { color:#ff4444; }

/* ---------- CUE LIST ---------- */
#cues {
    max-width: 700px;
    margin: 20px auto;
    text-align: left;
}

.cue {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
}
</style>
</head>

<body>

<h2>MIDI MTC Generator</h2>

<div>
    MIDI Out:
    <select id="midiOut"></select>

    FPS:
    <select id="fps">
        <option>24</option>
        <option selected>25</option>
        <option>29.97</option>
        <option>30</option>
        <option>50</option>
        <option>60</option>
    </select>
</div>

<div>
    Start TC <input id="startTC" value="00:00:00:00" size="10">
    End TC <input id="endTC" value="00:00:10:00" size="10">
    Loop <input type="checkbox" id="loop" checked>
</div>

<div id="timecode">00:00:00:00</div>

<div id="timeline">
    <div id="playhead"></div>
</div>

<div class="controls">
    <button class="play" onclick="play()">Play</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="stop" onclick="stop()">Stop</button>
</div>

<h3>Cues</h3>

<div>
    TC <input id="cueTC" value="00:00:02:00" size="10">
    Note <input id="cueNote" type="number" value="60" min="0" max="127">
    Ch <input id="cueCh" type="number" value="1" min="1" max="16">
    <button onclick="addCue()">Add Cue</button>
</div>

<div id="cues"></div>

<script>
let midiOutput, timer, running=false;
let fps=25;
let frames=0,seconds=0,minutes=0,hours=0;
let cues=[];

navigator.requestMIDIAccess().then(midi=>{
    const sel=midiOut;
    midi.outputs.forEach(o=>{
        let opt=document.createElement("option");
        opt.value=o.id; opt.text=o.name;
        sel.appendChild(opt);
    });
    sel.onchange=()=>midiOutput=midi.outputs.get(sel.value);
    if(sel.options.length){ sel.selectedIndex=0; midiOutput=midi.outputs.get(sel.value); }
});

fps.onchange=e=>fps=parseFloat(e.target.value);

function parseTC(tc){
    let [h,m,s,f]=tc.split(":").map(Number);
    return (((h*60+m)*60+s)*fps)+f;
}

function setFromFrames(t){
    frames=t%fps;
    seconds=Math.floor(t/fps)%60;
    minutes=Math.floor(t/(fps*60))%60;
    hours=Math.floor(t/(fps*3600))%24;
}

function tcString(){return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}:${pad(frames)}`;}
function pad(v){return v.toString().padStart(2,"0");}

function tick(){
    let t=parseTC(tcString())+1;
    let end=parseTC(endTC.value);
    if(t>end){
        if(loop.checked){ t=parseTC(startTC.value); resetCues(); }
        else{ stop(); return; }
    }
    setFromFrames(t);
    updateDisplay();
    sendMTC();
    checkCues(t);
}

function updateDisplay(){
    timecode.textContent=tcString();
    updateTimeline();
}

function updateTimeline(){
    let start=parseTC(startTC.value);
    let end=parseTC(endTC.value);
    let cur=parseTC(tcString());
    let p=(cur-start)/(end-start);
    playhead.style.left=(p*100)+"%";
}

function sendMTC(){
    if(!midiOutput)return;
    let rateBits=fps==25?1:fps==30?3:0;
    let d=[frames&15,(frames>>4)&1,seconds&15,(seconds>>4)&3,
           minutes&15,(minutes>>4)&3,hours&15,((hours>>4)&1)|(rateBits<<1)];
    for(let i=0;i<8;i++) midiOutput.send([0xF1,(i<<4)|d[i]]);
}

/* ---------- CUES ---------- */
function addCue(){
    let t=parseTC(cueTC.value);
    let cue={t, note:+cueNote.value, ch:+cueCh.value-1, fired:false};
    cues.push(cue);
    renderCues();
}

function renderCues(){
    cuesDiv.innerHTML="";
    document.querySelectorAll(".cue-marker").forEach(m=>m.remove());

    cues.forEach((c,i)=>{
        let div=document.createElement("div");
        div.className="cue";
        div.innerHTML=`${cueTCFromFrames(c.t)} | Note ${c.note} | Ch ${c.ch+1}
            <button onclick="removeCue(${i})">✕</button>`;
        cuesDiv.appendChild(div);

        let m=document.createElement("div");
        m.className="cue-marker";
        let start=parseTC(startTC.value), end=parseTC(endTC.value);
        m.style.left=((c.t-start)/(end-start)*100)+"%";
        timeline.appendChild(m);
    });
}

function cueTCFromFrames(t){
    let f=t%fps, s=Math.floor(t/fps)%60,
        m=Math.floor(t/(fps*60))%60, h=Math.floor(t/(fps*3600))%24;
    return `${pad(h)}:${pad(m)}:${pad(s)}:${pad(f)}`;
}

function removeCue(i){ cues.splice(i,1); renderCues(); }

function checkCues(t){
    cues.forEach(c=>{
        if(!c.fired && t>=c.t){
            fireCue(c);
            c.fired=true;
        }
    });
}

function resetCues(){ cues.forEach(c=>c.fired=false); }

function fireCue(c){
    if(!midiOutput)return;
    midiOutput.send([0x90|c.ch, c.note, 100]);
    setTimeout(()=>midiOutput.send([0x80|c.ch, c.note, 0]), 100);
}

/* ---------- TRANSPORT ---------- */
function play(){
    if(running)return;
    running=true;
    setFromFrames(parseTC(startTC.value));
    resetCues();
    timer=setInterval(tick,1000/fps);
}

function pause(){ running=false; clearInterval(timer); }
function stop(){ pause(); setFromFrames(parseTC(startTC.value)); updateDisplay(); }
</script>

</body>
</html>
